<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Hermes Inspector</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <h1>Hermes Inspector</h1>
      <p id="status" class="status">loading...</p>
    </div>

    <div class="filters" role="search" aria-label="Filters">
      <input id="f-search" type="search" placeholder="search title or content..." autocomplete="off" />
      <input id="f-date-from" type="date" aria-label="From date" />
      <input id="f-date-to" type="date" aria-label="To date" />
      <select id="f-source-task" aria-label="Source task">
        <option value="">all tasks</option>
      </select>
      <button id="btn-refresh" type="button" title="Refresh now">refresh</button>
      <label class="auto-toggle">
        <input id="f-auto" type="checkbox" checked />
        auto-refresh
      </label>
    </div>
  </header>

  <main class="layout">
    <section class="pane board-pane" aria-label="Kanban board">
      <div class="pane-head">
        <h2>Board</h2>
        <span id="board-count" class="muted"></span>
      </div>
      <div id="board" class="board"></div>
    </section>

    <section class="pane docs-pane" aria-label="Docs feed">
      <div class="pane-head">
        <h2>Docs</h2>
        <span id="docs-count" class="muted"></span>
      </div>
      <ul id="docs" class="docs"></ul>
    </section>
  </main>

  <div id="toast" class="toast" hidden></div>

  <script src="/app.js" defer></script>
</body>
</html>
